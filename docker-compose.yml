services:
  oracle-db:
    image: gvenzl/oracle-free:latest
    container_name: oracle-financial-db

    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}

    ports:
      - "${ORACLE_PORT}:1521"

    volumes:
      - oracle-financial-data:/opt/oracle/oradata
      - ./installers/apex-latest/apex:/opt/apex

    restart: unless-stopped

  ords:
    image: container-registry.oracle.com/database/ords:latest

    container_name: oracle-financial-ords

    depends_on:
      - oracle-db

    ports:
      - "8080:8080"

    environment:
      CONN_STRING: oracle-db:1521/FREEPDB1
      ORACLE_PWD: ${ORACLE_PASSWORD}

    volumes:
      - ords-config:/etc/ords/config
      - ./installers/apex-latest/apex/images:/opt/ords/images

    restart: unless-stopped

volumes:
  oracle-financial-data:
  ords-config:
